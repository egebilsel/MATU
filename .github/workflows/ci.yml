name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run syntax check
        run: python -m compileall matu baselines examples

      - name: Check CLI help
        run: python -m matu.cli --help

      - name: Check reference quick-start evaluation
        run: python quick_start/code/04_evaluate_reference_results.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t matu-uq .

      - name: Check Docker CLI
        run: docker run --rm matu-uq matu --help
