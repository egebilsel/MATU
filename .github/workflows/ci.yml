name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run checks
        run: make check

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t matu-uq .

      - name: Check Docker CLI
        run: docker run --rm matu-uq matu --help

      - name: Check Docker quick-start evaluation
        run: docker run --rm matu-uq make quick-eval

      - name: Check Docker paper evaluation
        run: docker run --rm matu-uq make paper-eval
